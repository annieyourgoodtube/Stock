<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Annie Hsu 資產管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Manrope:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #ece8dd; color: #2c2c28; padding-bottom: 50px; }
  .shell { max-width: 560px; margin: 0 auto; padding: 0 14px; }
  header { display: flex; justify-content: space-between; align-items: flex-end; padding: 26px 4px 16px; flex-wrap: wrap; gap: 14px; }
  .kicker { font-family: 'Manrope', sans-serif; font-size: 10px; letter-spacing: 3px; font-weight: 700; color: #a39e8d; }
  h1 { font-size: 24px; font-weight: 900; margin-top: 2px; letter-spacing: -0.5px; }
  .grand-box { background: #2c2c28; color: #fff; padding: 9px 16px; border-radius: 13px; text-align: right; }
  .grand-label { font-size: 10px; color: #b6b1a2; letter-spacing: 1px; }
  .grand-val { font-family: 'Manrope', sans-serif; font-size: 21px; font-weight: 800; margin-top: 1px; }
  nav { display: flex; gap: 5px; padding: 2px 0 16px; flex-wrap: wrap; }
  .tab { display: flex; align-items: center; gap: 4px; border: none; background: #ddd8c9; color: #76715f;
    padding: 9px 13px; border-radius: 10px; font-size: 12.5px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; }
  .tab.on { background: #2c2c28; color: #fff; }
  .tab:active { transform: scale(.96); }
  h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; }
  .sec-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 13px; }
  .add-btn { display: flex; align-items: center; gap: 4px; border: none; color: #fff; padding: 9px 14px;
    border-radius: 10px; font-size: 12.5px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; }
  .add-btn:active { transform: scale(.96); }
  .ghost-btn { border: 1.5px solid #d0cab9; background: #fff; color: #76715f; padding: 9px 13px;
    border-radius: 10px; font-size: 12.5px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .card { background: #fff; border-radius: 14px; padding: 13px 15px; display: flex; align-items: center; gap: 11px; margin-bottom: 8px; }
  .card-top { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
  .code-tag { font-family: 'Manrope', sans-serif; font-size: 13.5px; font-weight: 800; }
  .card-name { font-size: 13px; font-weight: 700; }
  .card-meta { font-size: 11.5px; color: #9a9586; margin-top: 3px; }
  .card-amt { font-family: 'Manrope', sans-serif; font-size: 14.5px; font-weight: 700; }
  .card-amt-sub { font-size: 10px; color: #a39e8d; }
  .icon-btn { width: 30px; height: 30px; border-radius: 8px; background: #f4f1e9; display: flex;
    align-items: center; justify-content: center; color: #76715f; border: none; cursor: pointer; font-size: 14px; }
  .icon-btn:active { background: #e6e1d3; }
  .empty { background: #fff; border-radius: 14px; padding: 30px 20px; text-align: center; color: #a39e8d; font-size: 12.5px; }
  .total-bar { background: #2c2c28; color: #fff; border-radius: 12px; padding: 12px 17px; margin-top: 3px;
    display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; font-weight: 700; }
  .total-bar .big { font-weight: 800; font-size: 16px; font-family: 'Manrope', sans-serif; }
  .edit-card { background: #fbfaf6; border-radius: 14px; padding: 14px 15px; margin-bottom: 8px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field-label { font-size: 11px; color: #9a9586; font-weight: 700; }
  .field input { border: 1.5px solid #ddd8c9; border-radius: 8px; padding: 9px 10px; font-size: 13.5px;
    background: #fff; width: 100%; font-family: inherit; }
  .field input:focus { outline: none; border-color: #4a4a44; }
  .edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 11px; }
  .date-bar { display: flex; justify-content: space-between; align-items: baseline;
    padding: 2px 4px 12px; }
  .date-text { font-size: 13px; color: #76715f; font-weight: 700; }
  .time-text { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 800; color: #2c2c28;
    letter-spacing: 0.5px; }
  .ov-top { background: #fff; border-radius: 18px; padding: 22px 20px; display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .donut { width: 144px; height: 144px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hole { width: 96px; height: 96px; border-radius: 50%; background: #fff; display: flex; flex-direction: column;
    align-items: center; justify-content: center; }
  .hole-sm { font-size: 10.5px; color: #a39e8d; letter-spacing: 1px; }
  .hole-big { font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 800; margin-top: 2px; }
  .ov-list { flex: 1; min-width: 195px; }
  .ov-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0ece1; }
  .dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
  .ov-label { font-size: 13.5px; font-weight: 700; }
  .ov-sub { font-size: 11.5px; color: #a39e8d; font-weight: 400; }
  .ov-val { font-family: 'Manrope', sans-serif; font-size: 14.5px; font-weight: 700; }
  .ov-pct { font-size: 11px; color: #a39e8d; }
  .countdown-sec { background: #fff; border-radius: 18px; padding: 18px 20px; margin-top: 12px; }
  .countdown-title { font-size: 14px; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .cd-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0ece1; }
  .cd-row:last-child { border-bottom: none; }
  .cd-left { display: flex; flex-direction: column; gap: 2px; }
  .cd-bank { font-size: 13px; font-weight: 700; }
  .cd-meta { font-size: 11px; color: #9a9586; }
  .cd-right { text-align: right; }
  .cd-days { font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 800; }
  .cd-date { font-size: 10.5px; color: #a39e8d; margin-top: 1px; }
  .cd-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; margin-top: 3px; }
  .int-line { font-size: 11px; color: #3a6f5c; font-weight: 700; margin-top: 4px; }
  .int-bar { background: #3a6f5c; color: #fff; border-radius: 12px; padding: 11px 17px; margin-top: 6px;
    display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; }
  .fx-box { background: #fff; border-radius: 12px; padding: 11px 15px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .fx-label { font-size: 12px; color: #76715f; font-weight: 700; }
  .fx-input { border: 1.5px solid #ddd8c9; border-radius: 8px; padding: 7px 10px; font-size: 14px;
    width: 90px; text-align: right; font-family: 'Manrope', sans-serif; font-weight: 700; }
  .fx-input:focus { outline: none; border-color: #4a4a44; }
  .ins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 11px;
    padding-top: 11px; border-top: 1px solid #f0ece1; }
  .ins-cell { background: #f6f3ea; border-radius: 9px; padding: 9px 11px; }
  .ins-cell-label { font-size: 11px; color: #9a9586; font-weight: 700; }
  .ins-cell-usd { font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 800; color: #b5894a; margin-top: 2px; }
  .ins-cell-twd { font-size: 11.5px; color: #76715f; margin-top: 1px; }
  .ins-note { font-size: 11px; color: #9a9586; line-height: 1.6; margin-top: 8px; padding: 0 4px; }
  .div-line { font-size: 11px; color: #c2602e; font-weight: 700; margin-top: 11px;
    padding-top: 10px; border-top: 1px solid #f0ece1; }
  .div-bar { background: #c2602e; color: #fff; border-radius: 12px; padding: 11px 17px; margin-top: 6px;
    display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; }
  .cur-tag { background: #f0e6d2; color: #8a6a2f; font-size: 10.5px; font-weight: 700;
    padding: 1px 7px; border-radius: 6px; }
  .fld-select { border: 1.5px solid #ddd8c9; border-radius: 8px; padding: 9px 10px; font-size: 13.5px;
    background: #fff; width: 100%; font-family: inherit; }
  .fld-select:focus { outline: none; border-color: #4a4a44; }
  .rate-note { font-size: 11px; color: #9a9586; margin: 6px 0 13px; }
  .rate-card { background: #fff; border-radius: 14px; padding: 13px 15px; margin-bottom: 9px; }
  .rate-head { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .rate-badge { color: #fff; font-size: 12px; font-weight: 700; padding: 4px 9px; border-radius: 7px; }
  .rate-tag { font-size: 11px; color: #9a9586; }
  .rate-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f3efe4; }
  .rate-k { font-size: 12px; color: #76715f; }
  .rate-v { font-size: 12px; font-weight: 700; font-family: 'Manrope', sans-serif; }
  .rate-mine { font-size: 11px; font-weight: 700; margin-top: 8px; background: #f6f3ea; padding: 6px 9px; border-radius: 8px; }
  footer { margin-top: 22px; padding: 13px 4px 0; border-top: 1px solid #d6d1c2; }
  .foot-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .foot-btn { border: 1.5px solid #cfc9b8; background: #fff; color: #5f5b4d; padding: 7px 13px;
    border-radius: 9px; font-size: 11.5px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .foot-note { font-size: 11px; color: #9a9586; line-height: 1.6; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div>
      <div class="kicker">ASSET TRACKER</div>
      <h1>Annie Hsu 資產管理</h1>
    </div>
    <div class="grand-box">
      <div class="grand-label">投資總資產</div>
      <div class="grand-val" id="grandTotal">NT$0</div>
    </div>
  </header>

  <nav id="nav"></nav>
  <main id="main"></main>

  <footer>
    <div class="foot-btns">
      <button class="foot-btn" onclick="exportData()">匯出備份</button>
      <button class="foot-btn" onclick="document.getElementById('importFile').click()">匯入備份</button>
      <button class="foot-btn" onclick="resetData()">還原預設</button>
      <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
    </div>
    <div class="foot-note">資料自動儲存在這台裝置的瀏覽器。換手機或清除瀏覽器資料前，請先「匯出備份」，到新裝置再「匯入備份」。</div>
  </footer>
</div>

<script>
const STORAGE_KEY = "asset_manager_html_v1";

const SEED = {
  cash: [
    { id: "c1", bank: "聯邦銀行", note: "New New Bank 新戶15%活動", currency: "TWD", balance: 100000, rate: 15.0 },
    { id: "c2", bank: "樂天銀行", note: "數位帳戶活存（1.5%無上限）", currency: "TWD", balance: 970000, rate: 1.5 },
    { id: "c3", bank: "永豐銀行", note: "DAWHO 大戶活存（30萬享1.5%、其餘一般利率）", currency: "TWD", balance: 1500000, rate: 0.42 }
  ],
  deposits: [
    { id: "d1", bank: "LINE Bank", name: "定期存款50萬-1", principal: 500000, rate: 2.05, maturity: "2027-06-21" },
    { id: "d2", bank: "LINE Bank", name: "定期存款2", principal: 500000, rate: 2.05, maturity: "2027-06-21" },
    { id: "d3", bank: "LINE Bank", name: "定期存款50萬3", principal: 500000, rate: 2.05, maturity: "2027-06-21" },
    { id: "d4", bank: "樂天銀行", name: "台幣定存", principal: 200000, rate: 1.93, maturity: "2027-02-22" },
    { id: "d5", bank: "樂天銀行", name: "台幣定存", principal: 100000, rate: 1.95, maturity: "2027-04-22" },
    { id: "d6", bank: "樂天銀行", name: "台幣定存", principal: 200000, rate: 1.95, maturity: "2027-04-22" },
    { id: "d7", bank: "永豐銀行", name: "立馬豐收臺定專案", principal: 1500000, rate: 1.9, maturity: "2026-08-22" },
    { id: "d8", bank: "樂天銀行", name: "一個月期定存", principal: 1000000, rate: 1.55, maturity: "2026-06-23" }
  ],
  etfs: [
    { id: "e1", code: "00878", name: "國泰永續高股息", shares: 4000, cost: 28.25, date: "2026-05-22", dividend: 2.0, payDate: "2026-07-21" }
  ],
  stocks: [],
  insurances: [
    { id: "i1", company: "中國人壽", name: "美鑫外幣利率變動型終身壽險", policyNo: "D1205192",
      currency: "USD", paid: 3592, cashValue: 4178, rate: 3.30 }
  ],
  fxRate: 32.5,
  fxRateJpy: 0.20
};

const RATES = [
  { bank: "LINE Bank", tag: "純網銀", color: "#1d9e75",
    rows: [["活存（一般）","約 0.6%"],["定存 6 個月","約 1.48%"],["定存 1 年期","約 1.77%"]],
    note: "你持有 3 筆定存・2.05% 限定專案" },
  { bank: "樂天銀行", tag: "純網銀", color: "#d85a30",
    rows: [["活存（無上限）","1.5%"],["新戶活存 5 萬內","2.8%"],["定存 1 年期","約 1.78%"],["新戶 10 天專案","15%（5萬內）"]],
    note: "你持有 3 筆定存・1.93%～1.95%" },
  { bank: "永豐銀行", tag: "DAWHO 大戶", color: "#378add",
    rows: [["大戶活存 30 萬內","1.5%"],["活存超過 30 萬","一般利率"],["換匯優利定存","優利特快車"]],
    note: "你持有 1 筆定存 150 萬・1.90%" },
  { bank: "聯邦銀行", tag: "New New Bank", color: "#ba7517",
    rows: [["新戶活存 10 萬內","15%（限時）"],["舊戶活存（達任務）","最高 4%"],["舊戶活存（未達任務）","1.5%"]],
    note: "高利率多有額度上限與任務條件" }
];

const TABS = [
  { k: "overview", label: "總覽" },
  { k: "cash", label: "活存" },
  { k: "deposit", label: "台幣定存" },
  { k: "etf", label: "ETF" },
  { k: "stock", label: "股票" },
  { k: "insurance", label: "保險" },
  { k: "rates", label: "銀行利率" }
];

let data, currentTab = "overview", editingId = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (!obj.cash) obj.cash = [];
      if (!obj.insurances) obj.insurances = [];
      if (obj.fxRate == null) obj.fxRate = 32.5;
      if (obj.fxRateJpy == null) obj.fxRateJpy = 0.20;
      return obj;
    }
  } catch (e) {}
  return JSON.parse(JSON.stringify(SEED));
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
}
function uid() { return Math.random().toString(36).slice(2, 9); }
function NT(n) { return "NT$" + Math.round(Number(n) || 0).toLocaleString("zh-TW"); }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function fxOf(cur) {
  if (cur === "TWD") return 1;
  if (cur === "JPY") return Number(data.fxRateJpy||0);
  return Number(data.fxRate||0);
}
function insToTwd(it) {
  return Number(it.cashValue||0) * fxOf(it.currency||"USD");
}

function totals() {
  const cash = data.cash.reduce((s,x) => s + Number(x.balance||0)*fxOf(x.currency||"TWD"), 0);
  const dep = data.deposits.reduce((s,x) => s + Number(x.principal||0), 0);
  const etf = data.etfs.reduce((s,x) => s + Number(x.shares||0)*Number(x.cost||0), 0);
  const stk = data.stocks.reduce((s,x) => s + Number(x.shares||0)*Number(x.cost||0), 0);
  const ins = data.insurances.reduce((s,x) => s + insToTwd(x), 0);
  return { cash, dep, etf, stk, ins, grand: cash+dep+etf+stk+ins };
}

function render() {
  const t = totals();
  document.getElementById("grandTotal").textContent = NT(t.grand);

  document.getElementById("nav").innerHTML = TABS.map(tb =>
    `<button class="tab ${tb.k===currentTab?'on':''}" onclick="setTab('${tb.k}')">${tb.label}</button>`
  ).join("");

  const main = document.getElementById("main");
  if (currentTab === "overview") main.innerHTML = viewOverview(t);
  else if (currentTab === "cash") main.innerHTML = viewCash();
  else if (currentTab === "deposit") main.innerHTML = viewDeposit();
  else if (currentTab === "etf") main.innerHTML = viewHolding("etf");
  else if (currentTab === "stock") main.innerHTML = viewHolding("stock");
  else if (currentTab === "insurance") main.innerHTML = viewInsurance();
  else if (currentTab === "rates") main.innerHTML = viewRates();
}

function setTab(k) { currentTab = k; editingId = null; render(); }

/* ---- 總覽 ---- */
function viewOverview(t) {
  const rows = [
    { label:"活存", val:t.cash, color:"#b5894a", sub:data.cash.length+" 個帳戶" },
    { label:"台幣定存", val:t.dep, color:"#3a6f5c", sub:data.deposits.length+" 筆" },
    { label:"ETF", val:t.etf, color:"#c2602e", sub:data.etfs.length+" 檔" },
    { label:"股票", val:t.stk, color:"#7a5ea8", sub:data.stocks.length+" 檔" },
    { label:"保險", val:t.ins, color:"#7a5ea8", sub:data.insurances.length+" 張" }
  ];
  let acc = 0;
  const stops = rows.map(r => {
    const f = t.grand>0 ? r.val/t.grand : 0;
    const s = r.color+" "+(acc*100).toFixed(2)+"% "+((acc+f)*100).toFixed(2)+"%";
    acc += f; return s;
  });
  const bg = t.grand>0 ? "conic-gradient("+stops.join(",")+")" : "#e6e1d6";
  const pct = v => t.grand>0 ? (v/t.grand*100).toFixed(1) : "0.0";
  return `<div class="date-bar">
      <span class="date-text" id="dateText">${dateStr()}</span>
      <span class="time-text" id="timeText">${timeStr()}</span>
    </div>
    <div class="ov-top">
    <div class="donut" style="background:${bg}">
      <div class="hole"><div class="hole-sm">總資產</div><div class="hole-big">${NT(t.grand)}</div></div>
    </div>
    <div class="ov-list">
      ${rows.map(r => `<div class="ov-row">
        <span style="display:flex;align-items:center;gap:9px">
          <span class="dot" style="background:${r.color}"></span>
          <span><span class="ov-label">${r.label}</span><span class="ov-sub"> · ${r.sub}</span></span>
        </span>
        <span style="text-align:right">
          <div class="ov-val">${NT(r.val)}</div><div class="ov-pct">${pct(r.val)}%</div>
        </span>
      </div>`).join("")}
    </div>
  </div>` + viewCountdown();
}

function dateStr() {
  const d = new Date();
  const wd = ["日","一","二","三","四","五","六"][d.getDay()];
  return d.getFullYear() + " 年 " + (d.getMonth()+1) + " 月 " + d.getDate() + " 日　星期" + wd;
}
function timeStr() {
  const d = new Date();
  const p = n => String(n).padStart(2,"0");
  return p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
}
function tickClock() {
  const dt = document.getElementById("dateText");
  const tt = document.getElementById("timeText");
  if (dt) dt.textContent = dateStr();
  if (tt) tt.textContent = timeStr();
}
setInterval(tickClock, 1000);

/* ---- 定存到期倒數 ---- */
function viewCountdown() {
  if (data.deposits.length === 0) return "";
  const today = new Date();
  today.setHours(0,0,0,0);
  const list = data.deposits.map(d => {
    let days = null;
    if (d.maturity) {
      const m = new Date(d.maturity + "T00:00:00");
      if (!isNaN(m)) days = Math.round((m - today) / 86400000);
    }
    return { ...d, days };
  }).sort((a,b) => {
    if (a.days == null) return 1;
    if (b.days == null) return -1;
    return a.days - b.days;
  });

  function style(days) {
    if (days == null) return { txt:"#a39e8d", pill:"未設定到期日", pbg:"#f0ece1", pfg:"#9a9586" };
    if (days < 0) return { txt:"#a32d2d", pill:"已到期", pbg:"#fcebeb", pfg:"#a32d2d" };
    if (days <= 60) return { txt:"#a32d2d", pill:"即將到期", pbg:"#fcebeb", pfg:"#a32d2d" };
    if (days <= 180) return { txt:"#854f0b", pill:"半年內", pbg:"#faeeda", pfg:"#854f0b" };
    return { txt:"#3a6f5c", pill:"", pbg:"", pfg:"" };
  }

  const rows = list.map(d => {
    const s = style(d.days);
    let daysTxt;
    if (d.days == null) daysTxt = "—";
    else if (d.days < 0) daysTxt = "已過期 " + Math.abs(d.days) + " 天";
    else if (d.days === 0) daysTxt = "今天到期";
    else daysTxt = "還有 " + d.days + " 天";
    return `<div class="cd-row">
      <div class="cd-left">
        <span class="cd-bank">${esc(d.bank)} <span style="font-weight:400;color:#9a9586;font-size:11px">${esc(d.name||"")}</span></span>
        <span class="cd-meta">${NT(d.principal)} ・ 利率 ${esc(d.rate)}% ・ 年息 ${NT(Number(d.principal||0)*Number(d.rate||0)/100)}</span>
      </div>
      <div class="cd-right">
        <div class="cd-days" style="color:${s.txt}">${daysTxt}</div>
        <div class="cd-date">${esc(d.maturity||"未設定")}</div>
        ${s.pill ? `<span class="cd-pill" style="background:${s.pbg};color:${s.pfg}">${s.pill}</span>` : ""}
      </div>
    </div>`;
  }).join("");

  return `<div class="countdown-sec">
    <div class="countdown-title">⏳ 定存到期日倒數</div>
    ${rows}
  </div>`;
}

function resetData() {

function exportData() {
  const blob = new Blob([JSON.stringify(data,null,2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "資產備份_" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
}
function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const obj = JSON.parse(e.target.result);
      if (obj && obj.deposits && obj.etfs) {
        data = { cash:obj.cash||[], deposits:obj.deposits||[], etfs:obj.etfs||[], stocks:obj.stocks||[],
          insurances:obj.insurances||[], fxRate:obj.fxRate==null?32.5:obj.fxRate,
          fxRateJpy:obj.fxRateJpy==null?0.20:obj.fxRateJpy };
        editingId = null; save(); render();
        alert("匯入成功！");
      } else alert("檔案格式不正確。");
    } catch (err) { alert("讀取失敗：檔案可能損毀。"); }
  };
  reader.readAsText(file);
  ev.target.value = "";
}

data = load();
render();
</script>
